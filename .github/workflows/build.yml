name: Build Secret Images APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      - name: Build Debug APK
        run: gradle assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: secret-images-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Generate or restore keystore
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/upload-keystore.jks
            echo "STORE_PASS=${{ secrets.KEY_STORE_PASSWORD }}" >> $GITHUB_ENV
            echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> $GITHUB_ENV
            echo "KEY_PASS=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_ENV
          else
            keytool -genkey -v -keystore app/upload-keystore.jks \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -alias upload \
              -storepass android123 \
              -keypass android123 \
              -dname "CN=SecretImages, OU=Dev, O=SecretImages, L=Tokyo, ST=Tokyo, C=JP"
            echo "STORE_PASS=android123" >> $GITHUB_ENV
            echo "KEY_ALIAS=upload" >> $GITHUB_ENV
            echo "KEY_PASS=android123" >> $GITHUB_ENV
          fi

      - name: Build Release AAB
        run: gradle bundleRelease

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: secret-images-release-aab
          path: app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Upload keystore
        uses: actions/upload-artifact@v4
        with:
          name: upload-keystore
          path: app/upload-keystore.jks
          retention-days: 90
